name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Note interne"
        required: false
        default: ""
  push:
    tags:
      - "tf-v*"

concurrency:
  group: ios-testflight
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: macos-15
    timeout-minutes: 90
    environment: production

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MOBILE_REPO }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          path: app

      - name: Select Xcode 26.x
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::Xcode 26.x not found on runner"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Cache CocoaPods : évite de re-télécharger les podspecs à chaque build
      # (eas build --local fait pod install dans un dossier temporaire mais réutilise
      # ces caches utilisateur). Clé sur le lockfile JS = proxy des versions natives.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd app && npm ci

      - name: Compute build number
        env:
          OFFSET: "100"
        run: |
          BN=$(( ${{ github.run_number }} + OFFSET ))
          echo "BUILD_NUMBER=$BN" >> "$GITHUB_ENV"

      - name: Inject build number
        run: |
          node -e '
            const fs = require("fs");
            const p = "app/app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const bn = process.env.BUILD_NUMBER;
            j.expo.ios = j.expo.ios || {};
            j.expo.android = j.expo.android || {};
            j.expo.ios.buildNumber = String(bn);
            j.expo.android.versionCode = Number(bn);
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

      - name: Build .ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ALLOW_FAILURE: "true"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
        run: |
          cd app
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output ../app-store.ipa

      # La clé App Store Connect API (.p8, secret) est écrite dans le fichier attendu
      # par eas.json (submit.production.ios.ascApiKeyPath). On la passe via une
      # variable d'env puis on l'écrit telle quelle avec node (préserve les retours
      # ligne PEM sans réencodage). Effacée en fin de job.
      - name: Write ASC API key
        env:
          ASC_API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          node -e 'const k=process.env.ASC_API_KEY||""; require("crypto").createPrivateKey({key:k,format:"pem"}); require("fs").writeFileSync("app/asc-api-key.p8", k);' \
            || { echo "::error::APPSTORE_API_PRIVATE_KEY manquante ou clé PEM invalide"; exit 1; }

      # eas submit lit ascAppId / ascApiKeyPath / ascApiKeyIssuerId / ascApiKeyId
      # depuis eas.json. Plus robuste que l'action apple-actions (qui butait sur le
      # décodage de la clé), et cohérent avec le workflow Android.
      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd app
          eas submit \
            --platform ios \
            --profile production \
            --path ../app-store.ipa \
            --non-interactive

      # Aucun artifact n'est conservé : le .ipa ne va QUE vers TestFlight. On efface
      # le binaire ET la clé ASC en fin de job (hygiène, le runner est jeté ensuite).
      - name: Wipe build outputs and secrets
        if: always()
        run: rm -f ./app-store.ipa app/asc-api-key.p8
