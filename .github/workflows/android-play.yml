name: Android Play

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Note interne"
        required: false
        default: ""
  push:
    tags:
      - "play-v*"

concurrency:
  group: android-play
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MOBILE_REPO }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          path: app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd app && npm ci

      - name: Compute build number
        env:
          OFFSET: "100"
        run: |
          BN=$(( ${{ github.run_number }} + OFFSET ))
          echo "BUILD_NUMBER=$BN" >> "$GITHUB_ENV"

      - name: Inject build number
        run: |
          node -e '
            const fs = require("fs");
            const p = "app/app.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const bn = process.env.BUILD_NUMBER;
            j.expo.ios = j.expo.ios || {};
            j.expo.android = j.expo.android || {};
            j.expo.ios.buildNumber = String(bn);
            j.expo.android.versionCode = Number(bn);
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

      # Le service account Google Play (secret) est écrit dans le fichier attendu
      # par eas.json (submit.production.android.serviceAccountKeyPath). Jamais commité,
      # effacé en fin de job. Le secret passe par une variable d'env (pas d'interpolation
      # inline dans la ligne shell) puis est écrit via node sans le réémettre.
      - name: Write Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          node -e 'const j=process.env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON||""; JSON.parse(j); require("fs").writeFileSync("app/play-service-account.json", j); ' \
            || { echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON manquant ou JSON invalide"; exit 1; }

      # google-services.json (config Firebase client) écrit dans app/ AVANT le build.
      # app.config.js le récupère via son repli sur le fichier local — plus fiable que
      # de compter sur la matérialisation du secret fichier EAS par `eas build --local`.
      # Sans ce fichier, le natif lève « Default FirebaseApp is not initialized » et
      # getExpoPushTokenAsync échoue (aucun token push). Effacé en fin de job.
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          node -e 'const j=process.env.GOOGLE_SERVICES_JSON||""; JSON.parse(j); require("fs").writeFileSync("app/google-services.json", j); ' \
            || { echo "::error::GOOGLE_SERVICES_JSON manquant ou JSON invalide"; exit 1; }

      - name: Build .aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ALLOW_FAILURE: "true"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_POSTHOG_KEY: ${{ secrets.EXPO_PUBLIC_POSTHOG_KEY }}
          EXPO_PUBLIC_POSTHOG_HOST: ${{ secrets.EXPO_PUBLIC_POSTHOG_HOST }}
        run: |
          cd app
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ../app-release.aab

      # eas submit lit le track (internal) et le serviceAccountKeyPath depuis eas.json.
      - name: Submit to Play (internal)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd app
          eas submit \
            --platform android \
            --profile production \
            --path ../app-release.aab \
            --non-interactive

      # Aucun artifact n'est conservé : l'.aab ne va QUE vers Play (internal).
      # On efface le binaire ET la clé service account en fin de job.
      - name: Wipe build outputs and secrets
        if: always()
        run: rm -f ./app-release.aab app/play-service-account.json app/google-services.json
